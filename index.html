<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>No Matter What Family Tree</title>
<style>
:root {
  --brand:#2f5d50;
  --brand2:#3d6e60;
  --line:#9aa6a0;
  --card:#fff;
  --bg:#f4f4f2;
  --panel:#173a31;
  --panel2:#245448;
}
* { box-sizing:border-box; }
html,body { margin:0; width:100%; min-height:100%; font-family:Arial,sans-serif; background:var(--bg); color:#222; }
button,input,select { font:inherit; }

/* Splash */
#splash {
  position:fixed;
  inset:0;
  z-index:5000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:
    radial-gradient(circle at center, #315f52 0%, #173a31 58%, #0d241e 100%);
  transition:opacity .55s ease, visibility .55s ease;
}
#splash.hide {
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
.splash-orbit {
  position:relative;
  width:min(78vw,560px);
  height:min(78vw,560px);
  display:flex;
  align-items:center;
  justify-content:center;
}
.splash-ring {
  position:absolute;
  inset:7%;
  border:2px solid rgba(255,255,255,.22);
  border-radius:50%;
  animation:spin 12s linear infinite;
}
.splash-ring::before,
.splash-ring::after {
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 25px rgba(255,255,255,.8);
}
.splash-ring::before { top:-9px; left:50%; }
.splash-ring::after { bottom:-9px; left:24%; }
.splash-title {
  width:78%;
  color:#fff;
  text-align:center;
  font-weight:800;
  font-size:clamp(2rem,7vw,4.8rem);
  line-height:1.05;
  letter-spacing:.04em;
  text-shadow:0 5px 24px rgba(0,0,0,.35);
  animation:float 3.2s ease-in-out infinite;
}
.enter-button {
  position:absolute;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  border:1px solid rgba(255,255,255,.75);
  background:rgba(255,255,255,.12);
  color:#fff;
  border-radius:999px;
  padding:13px 30px;
  font-weight:700;
  cursor:pointer;
  backdrop-filter:blur(8px);
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes float { 50% { transform:translateY(-8px) scale(1.015); } }

/* App shell */
#app { min-height:100vh; display:grid; grid-template-columns:260px minmax(0,1fr); }
.sidebar {
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  background:linear-gradient(180deg,var(--panel),#102a23);
  color:#fff;
  padding:22px 16px;
  box-shadow:4px 0 16px rgba(0,0,0,.15);
  z-index:30;
}
.brand {
  font-size:1.28rem;
  line-height:1.15;
  font-weight:800;
  margin-bottom:22px;
}
.menu-label {
  margin:16px 4px 7px;
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:rgba(255,255,255,.65);
}
.control {
  width:100%;
  min-height:46px;
  margin-bottom:8px;
  padding:10px 12px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:10px;
  background:rgba(255,255,255,.08);
  color:#fff;
  text-align:left;
  cursor:pointer;
}
.control:hover { background:rgba(255,255,255,.16); }
.sidebar input,
.sidebar select {
  width:100%;
  min-height:46px;
  margin-bottom:8px;
  padding:10px 11px;
  border:1px solid rgba(255,255,255,.28);
  border-radius:10px;
  background:#fff;
  color:#222;
  font-size:16px;
}
.content {
  min-width:0;
  padding:22px;
  overflow:hidden;
}
.content-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}
.content-header h1 { margin:0; font-size:clamp(1.5rem,3vw,2.4rem); }
.view-label { color:#68736f; font-size:.9rem; }
.tree {
  width:100%;
  max-width:100%;
  overflow-x:auto;
  overflow-y:visible;
  padding:20px 10px 60px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-x:contain;
  touch-action:pan-x pan-y;
}
.tree > ul {
  width:max-content;
  min-width:100%;
  justify-content:flex-start;
  padding-left:18px;
  padding-right:18px;
}
ul { padding-top:20px; position:relative; display:flex; justify-content:center; margin:0; padding-left:0; }
li { list-style:none; text-align:center; position:relative; padding:20px 8px 0; }
li:before,li:after { content:''; position:absolute; top:0; right:50%; border-top:2px solid var(--line); width:50%; height:20px; }
li:after { right:auto; left:50%; border-left:2px solid var(--line); }
li:only-child:before,li:only-child:after { display:none; }
li:only-child { padding-top:0; }
li:first-child:before,li:last-child:after { border:0; }
li:last-child:before { border-right:2px solid var(--line); border-radius:0 5px 0 0; }
li:first-child:after { border-radius:5px 0 0 0; }
ul ul:before { content:''; position:absolute; top:0; left:50%; border-left:2px solid var(--line); height:20px; }
.card {
  min-width:145px;
  max-width:180px;
  background:var(--card);
  border:2px solid #5b6f82;
  border-radius:12px;
  padding:10px;
  display:inline-block;
  box-shadow:0 2px 7px rgba(0,0,0,.08);
  cursor:pointer;
  touch-action:manipulation;
}
.name { font-weight:700; }
.date { font-size:13px; color:#555; margin-top:3px; }
.badge { display:inline-block; margin-top:5px; padding:2px 7px; border-radius:999px; background:#5b6f82; color:#fff; font-size:11px; }
.hidden>ul { display:none; }
.branch-hidden { display:none!important; }
.hit { outline:4px solid rgba(47,93,80,.25); }

/* Form modal */
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.58); z-index:1000; padding:20px; overflow:auto; }
.modal.open { display:block; }
.dialog { position:relative; max-width:800px; height:92vh; margin:0 auto; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 15px 40px rgba(0,0,0,.28); display:flex; flex-direction:column; }
.close { position:absolute; right:10px; top:6px; z-index:2; border:0; background:#fff; font-size:28px; line-height:1; cursor:pointer; }
iframe { width:100%; height:100%; border:0; display:block; flex:1 1 auto; min-height:0; }

@media(max-width:820px) {
  #app { display:block; }
  .sidebar {
    position:relative;
    height:auto;
    overflow:visible;
    padding:14px;
  }
  .brand { margin-bottom:12px; }
  .sidebar-controls {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .menu-label { grid-column:1/-1; margin-top:8px; }
  .control,.sidebar input,.sidebar select { margin:0; text-align:center; }
  .sidebar input,.sidebar select { grid-column:1/-1; }
  .content { padding:14px 10px 30px; }
  .content-header { align-items:flex-start; }
  .tree { padding-top:8px; }
  .modal { padding:0; }
  .dialog { width:100vw; max-width:none; height:100dvh; min-height:100vh; margin:0; border-radius:0; }
  .close { position:fixed; top:max(8px,env(safe-area-inset-top)); right:10px; width:44px; height:44px; border-radius:999px; box-shadow:0 2px 8px rgba(0,0,0,.18); }
  iframe { padding-top:54px; }
}
@media(max-width:520px) {
  .sidebar-controls { grid-template-columns:1fr; }
  .menu-label,.sidebar input,.sidebar select { grid-column:1; }
  .splash-orbit { width:92vw; height:92vw; }
  .content-header { display:block; }
  .view-label { margin-top:4px; }
}
@media print {
  #splash,.sidebar,.modal { display:none!important; }
  #app { display:block; }
  .content { padding:0; }
  .tree { overflow:visible; }
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-orbit">
    <div class="splash-ring"></div>
    <div class="splash-title">NO MATTER WHAT<br>FAMILY TREE</div>
    <button class="enter-button" onclick="enterSite()">Enter</button>
  </div>
</div>

<div id="app">
  <aside class="sidebar">
    <div class="brand">No Matter What<br>Family Tree</div>
    <div class="sidebar-controls">
      <div class="menu-label">Members</div>
      <button class="control" onclick="openForm('add')">Add Member</button>
      <button class="control" onclick="openForm('update')">Update Member</button>
      <button class="control" onclick="openForm('lists')">Request Lists</button>

      <div class="menu-label">Branch</div>
      <select id="branchSelect" onchange="showBranch()">
        <option value="">Select sponsor branch</option>
      </select>

      <div class="menu-label">Search</div>
      <input id="q" placeholder="Search name" oninput="searchName()">

      <div class="menu-label">Tree</div>
      <button class="control" onclick="showFullTree()">Show Full Tree</button>
      <button class="control" onclick="expandAll()">Expand All</button>
      <button class="control" onclick="collapseAll()">Collapse All</button>
      <button class="control" onclick="window.print()">Print / Save PDF</button>
    </div>
  </aside>

  <main class="content">
    <div class="content-header">
      <h1>Tree</h1>
      <div id="viewLabel" class="view-label">Collapsed full tree</div>
    </div>
    <div id="tree" class="tree"></div>
  </main>
</div>

<div id="formModal" class="modal">
  <div class="dialog">
    <button class="close" onclick="closeForm()" aria-label="Close">&times;</button>
    <iframe id="formFrame" title="No Matter What Family Tree form"></iframe>
  </div>
</div>

<script>
const FORM_WEB_APP_URL="https://script.google.com/macros/s/AKfycbymQT3RB_HJWm1By9SJqgEbydhPuE72wf_mBtabWFTDUCxKnOxQOYaBBr1FduIYZj28eg/exec";
const DATA={"people": [{"id": "richard_m", "name": "Richard M.", "clean_date": "12/24/1964", "sponsor_name": null, "sponsor_id": null}, {"id": "juan_y", "name": "Juan Y.", "clean_date": "3/5/1979", "sponsor_name": "Richard M.", "sponsor_id": "richard_m"}, {"id": "eddie_l", "name": "Eddie L.", "clean_date": "2/1/1989", "sponsor_name": "Juan Y.", "sponsor_id": "juan_y"}, {"id": "chris_j", "name": "Chris J.", "clean_date": "12/27/2001", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "steven_r", "name": "Steven R.", "clean_date": "4/21/2000", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "ernest_c", "name": "Ernest C.", "clean_date": "1/10/2012", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "mike_m", "name": "Mike M.", "clean_date": "6/9/1996", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "travis_v", "name": "Travis V.", "clean_date": "9/11/2017", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "ronnie_r", "name": "Ronnie R.", "clean_date": "9/11/2017", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "anthony_q", "name": "Anthony Q.", "clean_date": "10/24/2017", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "marquis_r", "name": "Marquis R.", "clean_date": "8/1/2012", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "michael_g", "name": "Michael G.", "clean_date": "11/13/2025", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "jimmy_m", "name": "Jimmy M.", "clean_date": "3/27/1991", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "pete_a", "name": "Pete A.", "clean_date": "2/8/2003", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "jimmy_w", "name": "Jimmy W.", "clean_date": "11/6/2020", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "steve_l", "name": "Steve L.", "clean_date": "8/12/2001", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "rick_s", "name": "Rick S.", "clean_date": "1/23/1993", "s : "11/7/2022", "sponsor_name": "Collin W.", "sponsor_id": "collin_w"}, {"id": "alex_l", "name": "Alex L.", "clean_date": "9/24/2024", "sponsor_name": "Collin W.", "sponsor_id": "collin_w"}, {"id": "ramon_g", "name": "Ramon G.", "clean_date": "12/26/2020", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "ronnie_p", "name": "Ronnie P.", "clean_date": "10/20/2024", "sponsor_name": "Ramon G.", "sponsor_id": "ramon_g"}, {"id": "jason_h", "name": "Jason H.", "clean_date": "3/1/2026", "sponsor_name": "Ramon G.", "sponsor_id": "ramon_g"}, {"id": "carlos_a", "name": "Carlos A.", "clean_date": "10/1/2023", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "louie_u", "name": "Louie U.", "clean_date": "4/20/2024", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "aaron_a", "name": "Aaron A.", "clean_date": "12/28/2011", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "gavin_l", "name": "Gavin L.", "clean_date": "2/25/2022", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "mark_e", "name": "Mark E.", "clean_date": "6/7/2023", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "ac_a", "name": "AC A.", "clean_date": "8/1/2023", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "daniel_l", "name": "Daniel L.", "clean_date": "8/5/2024", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "christopher_j", "name": "Christopher J.", "clean_date": "8/3/2025", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "luke_s", "name": "Luke S.", "clean_date": "12/10/2018", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "dean_t", "name": "Dean T.", "clean_date": "4/13/2022", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "trini_m", "name": "Trini M.", "clean_date": "8/19/2024", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "jay_p", "name": "Jay P.", "clean_date": "3/28/2025", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "christian_t", "name": "Christian T.", "clean_date": "3/1/2026", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "eric_z", "name": "Eric Z.", "clean_date": "6/9/2026", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "joseph_p", "name": "Joseph P.", "clean_date": "1/1/2022", "sponsor_name": "Jimmy M.", "sponsor_id": "jimmy_m"}, {"id": "tiago_r", "name": "Tiago R.", "clean_date": "4/2/2025", "sponsor_name": "Jimmy W.", "sponsor_id": "jimmy_w"}], "children": {"richard_m": ["juan_y"], "juan_y": ["eddie_l"], "eddie_l": ["anthony_q", "chris_j", "ernest_c", "jimmy_m", "jimmy_w", "marquis_r", "michael_g", "mike_m", "pete_a", "ronnie_r", "steve_l", "steven_r", "travis_v"], "chris_j": [], "steven_r": [], "ernest_c": [], "mike_m": ["aaron_a", "beco_p", "brad_m", "dean_t", "edgar_f", "luke_s", "paul_s", "rick_s"], "travis_v": [], "ronnie_r": [], "anthony_q": ["christian_t", "eric_z", "jay_p", "trini_m"], "marquis_r": [], "michael_g": [], "jimmy_m": ["joseph_p"], "pete_a": [], "jimmy_w": ["tiago_r"], "steve_l": [], "rick_s": [], "paul_s": [], "brad_m": ["patrick_s"], "patrick_s": [], "edgar_f": ["elliot_w", "max_w", "sean_o"], "elliot_w": [], "max_w": ["chris_r"], "chris_r": [], "sean_o": [], "beco_p": ["carlos_a", "collin_w", "forrest_m", "hector_a", "louie_u", "ramon_g"], "forrest_m": ["chris_n", "marquez_c"], "chris_n": [], "marquez_c": [], "hector_a": ["david_d", "mark_e__jr"], "david_d": [], "mark_e__jr": [], "collin_w": ["alex_b", "alex_l"], "alex_b": [], "alex_l": [], "ramon_g": ["jason_h", "ronnie_p"], "ronnie_p": [], "jason_h": [], "carlos_a": [], "louie_u": [], "aaron_a": ["ac_a", "christopher_j", "daniel_l", "gavin_l", "mark_e"], "gavin_l": [], "mark_e": [], "ac_a": [], "daniel_l": [], "christopher_j": [], "luke_s": [], "dean_t": [], "trini_m": [], "jay_p": [], "christian_t": [], "eric_z": [], "joseph_p": [], "tiago_r": []}, "root": "richard_m"};
const byId=Object.fromEntries(DATA.people.map(p=>[p.id,p]));
const parentById=Object.fromEntries(
  DATA.people.filter(p=>p.sponsor_id).map(p=>[p.id,p.sponsor_id])
);

function enterSite() {
  document.getElementById("splash").classList.add("hide");
}

function populateBranchDropdown() {
  const select=document.getElementById("branchSelect");
  DATA.people
    .filter(p=>(DATA.children[p.id]||[]).length>0)
    .sort((a,b)=>a.name.localeCompare(b.name))
    .forEach(person=>{
      const option=document.createElement("option");
      option.value=person.id;
      option.textContent=person.name;
      select.appendChild(option);
    });
}

function card(p) {
  const n=(DATA.children[p.id]||[]).length;
  return `<div class="card" data-name="${p.name.toLowerCase()}" onclick="toggle(event,'${p.id}')">
    <div class="name">${p.name}</div>
    <div class="date">Clean: ${p.clean_date}</div>
    ${n?`<div class="badge">${n} sponsee${n===1?'':'s'}</div>`:''}
  </div>`;
}

function node(id) {
  let s=`<li id="n-${id}">${card(byId[id])}`;
  const kids=DATA.children[id]||[];
  if(kids.length) s+='<ul>'+kids.map(node).join('')+'</ul>';
  return s+'</li>';
}

document.getElementById("tree").innerHTML='<ul>'+node(DATA.root)+'</ul>';
populateBranchDropdown();
collapseAll();

function clearBranchFilter() {
  document.querySelectorAll(".branch-hidden").forEach(el=>el.classList.remove("branch-hidden"));
}

function showFullTree() {
  clearBranchFilter();
  document.getElementById("branchSelect").value="";
  collapseAll();
  document.getElementById("viewLabel").textContent="Collapsed full tree";
}

function showBranch() {
  const id=document.getElementById("branchSelect").value;
  clearBranchFilter();
  collapseAll();

  if(!id) {
    document.getElementById("viewLabel").textContent="Collapsed full tree";
    return;
  }

  const path=[];
  let current=id;
  while(current) {
    path.unshift(current);
    current=parentById[current];
  }

  for(let i=0;i<path.length-1;i++) {
    const ancestorId=path[i];
    const keepChildId=path[i+1];
    const ancestorNode=document.getElementById("n-"+ancestorId);
    if(!ancestorNode) continue;

    ancestorNode.classList.remove("hidden");
    const directChildList=ancestorNode.querySelector(":scope > ul");

    if(directChildList) {
      [...directChildList.children].forEach(childLi=>{
        if(childLi.id!=="n-"+keepChildId) {
          childLi.classList.add("branch-hidden");
        }
      });
    }
  }

  const selectedNode=document.getElementById("n-"+id);
  if(selectedNode) {
    selectedNode.querySelectorAll(".hidden").forEach(el=>el.classList.remove("hidden"));
    selectedNode.classList.remove("hidden");
    document.getElementById("viewLabel").textContent=byId[id].name+" branch";
    requestAnimationFrame(()=>selectedNode.scrollIntoView({behavior:"smooth",block:"start",inline:"center"}));
  }
}

function toggle(e,id) {
  e.stopPropagation();
  document.getElementById("n-"+id).classList.toggle("hidden");
}

function expandAll() {
  clearBranchFilter();
  document.querySelectorAll(".hidden").forEach(x=>x.classList.remove("hidden"));
  document.getElementById("branchSelect").value="";
  document.getElementById("viewLabel").textContent="Expanded full tree";
}

function collapseAll() {
  document.querySelectorAll("#tree li").forEach(x=>{
    if(x.querySelector(":scope > ul")) x.classList.add("hidden");
  });
  document.getElementById("n-"+DATA.root).classList.remove("hidden");
}

function searchName() {
  const q=document.getElementById("q").value.trim().toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.classList.remove("hit");
    if(q&&c.dataset.name.includes(q)) {
      clearBranchFilter();
      c.classList.add("hit");
      let li=c.closest("li");
      while(li) {
        li.classList.remove("hidden");
        li=li.parentElement?.closest("li");
      }
      c.scrollIntoView({behavior:"smooth",block:"center",inline:"center"});
      document.getElementById("viewLabel").textContent="Search result";
    }
  });
}

function openForm(mode) {
  if(FORM_WEB_APP_URL.includes("PASTE_GOOGLE")) {
    alert("The form web app URL has not been configured.");
    return;
  }
  document.getElementById("formFrame").src=
    FORM_WEB_APP_URL+"?mode="+encodeURIComponent(mode)+"&t="+Date.now();
  document.getElementById("formModal").classList.add("open");
}

function closeForm() {
  document.getElementById("formModal").classList.remove("open");
  document.getElementById("formFrame").src="about:blank";
}

document.getElementById("formModal").addEventListener("click",e=>{
  if(e.target.id==="formModal") closeForm();
});

window.addEventListener("message",e=>{
  if(e.data&&e.data.type==="family-tree-form-close") closeForm();
});
</script>
</body>
</html>
