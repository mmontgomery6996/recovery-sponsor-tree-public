<title>No Matter What Family Tree</title>
<style>
:root{--blue:#1238c7;--dark:#081b73;--line:#9aa6a0;--bg:#f4f4f2;--card:#fff}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:var(--bg);color:#222}button,input,select{font:inherit}
#splash{position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#2149d8 0%,#1238c7 58%,#081b73 100%);transition:.5s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}.orbit{position:relative;width:min(78vw,560px);height:min(78vw,560px);display:flex;align-items:center;justify-content:center}.ring{position:absolute;inset:7%;border:2px solid rgba(255,255,255,.28);border-radius:50%;animation:spin 12s linear infinite}.ring:before,.ring:after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 0 24px #fff}.ring:before{left:50%;top:0;transform:translate(-50%,-50%)}.ring:after{left:14.6447%;top:85.3553%;transform:translate(-50%,-50%)}.splash-title{color:#fff;text-align:center;font-weight:800;font-size:clamp(2rem,7vw,4.8rem);line-height:1.05;text-shadow:0 5px 24px rgba(0,0,0,.35)}.enter{position:absolute;bottom:7%;left:50%;transform:translateX(-50%);padding:13px 30px;border:1px solid #fff;border-radius:999px;background:rgba(255,255,255,.12);color:#fff;font-weight:700}@keyframes spin{to{transform:rotate(360deg)}}
#app{min-height:100vh;display:grid;grid-template-columns:250px minmax(0,1fr)}
.sidebar{position:sticky;top:0;height:100vh;overflow:auto;background:linear-gradient(180deg,var(--blue),var(--dark));color:#fff;padding:16px 0;z-index:30}.brand{padding:0 14px 16px;font-size:1.25rem;font-weight:800}.label{padding:12px 14px 6px;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.7)}.tile{display:block;width:100%;min-height:46px;padding:11px 14px;border:0;border-top:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff;text-align:left;cursor:pointer}.tile:hover{background:rgba(255,255,255,.16)}.sidebar select,.sidebar input{width:calc(100% - 24px);margin:0 12px 8px;min-height:46px;padding:10px;border:0;border-radius:8px;background:#fff;color:#222;font-size:16px}
.main{min-width:0;padding:18px 14px 50px;overflow-x:hidden}.workspace{min-height:75vh}.blank{min-height:70vh}
.outline{margin:0;padding:0;list-style:none;max-width:900px}.outline ul{list-style:none;margin:0;padding-left:28px;border-left:3px solid var(--branch-color,var(--line))}.outline li{position:relative;margin:0;padding:5px 0}.outline ul>li:before{content:"";position:absolute;left:-28px;top:28px;width:22px;border-top:3px solid var(--branch-color,var(--line))}.person{display:block;width:max-content;border-left:7px solid var(--card-branch-color,#5b6f82);max-width:calc(100vw - 300px);min-width:145px;padding:10px 12px;background:var(--card);border:2px solid #5b6f82;border-radius:10px;box-shadow:0 2px 7px rgba(0,0,0,.08)}.person .name{font-weight:700}.person .date{font-size:13px;color:#555;margin-top:3px}.person.hit{outline:4px solid rgba(18,56,199,.22)}
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);padding:18px}.modal.open{display:block}.dialog{position:relative;max-width:800px;height:92vh;margin:auto;background:#fff;border-radius:14px;overflow:hidden}.close{position:absolute;right:10px;top:6px;z-index:2;width:44px;height:44px;border:0;border-radius:50%;background:#fff;font-size:28px}.dialog iframe{width:100%;height:100%;border:0;padding-top:54px}
@media(max-width:820px){#app{display:block}.sidebar{position:relative;height:auto;padding:0}.brand{padding-top:14px}.main{padding:12px 8px 40px}.person{max-width:calc(100vw - 55px);min-width:130px}.outline ul{padding-left:22px}.outline ul>li:before{left:-22px;width:17px}.modal{padding:0}.dialog{width:100vw;max-width:none;height:100dvh;min-height:100vh;border-radius:0}.close{position:fixed;top:max(8px,env(safe-area-inset-top));right:10px}}
</style></head><body>
<div id="splash"><div class="orbit"><div class="ring"></div><div class="splash-title">NO MATTER WHAT<br>FAMILY TREE</div><button class="enter" onclick="enterSite()">Enter</button></div></div>
<div id="app"><aside class="sidebar"><div class="brand">No Matter What<br>Family Tree</div><div class="label">Members</div><button class="tile" onclick="openForm('add')">Add Member</button><button class="tile" onclick="openForm('update')">Update Member</button><button class="tile" onclick="openForm('lists')">Request Lists</button><div class="label">Branch Sponsor</div><select id="branchSelect" onchange="showBranch()"><option value="">Select sponsor branch</option></select><div class="label">Search Name</div><input id="searchBox" placeholder="Search name" oninput="searchTree()"><div class="label">Connections</div><div style="padding:0 14px 12px;font-size:.78rem;line-height:1.35;color:rgba(255,255,255,.82)">Each sponsor branch has its own line color.</div><div class="label">Tree</div><button class="tile" onclick="expandTree()">Expand Tree</button><button class="tile" onclick="collapseTree()">Collapse Tree</button><button class="tile" onclick="window.print()">Print / Save PDF</button></aside><main class="main"><div id="workspace" class="workspace"><div class="blank"></div></div></main></div>
<div id="modal" class="modal"><div class="dialog"><button class="close" onclick="closeForm()">&times;</button><iframe id="formFrame"></iframe></div></div>
<script>

: "11/7/2022", "sponsor_name": "Collin W.", "sponsor_id": "collin_w"}, {"id": "alex_l", "name": "Alex L.", "clean_date": "9/24/2024", "sponsor_name": "Collin W.", "sponsor_id": "collin_w"}, {"id": "ramon_g", "name": "Ramon G.", "clean_date": "12/26/2020", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "ronnie_p", "name": "Ronnie P.", "clean_date": "10/20/2024", "sponsor_name": "Ramon G.", "sponsor_id": "ramon_g"}, {"id": "jason_h", "name": "Jason H.", "clean_date": "3/1/2026", "sponsor_name": "Ramon G.", "sponsor_id": "ramon_g"}, {"id": "carlos_a", "name": "Carlos A.", "clean_date": "10/1/2023", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "louie_u", "name": "Louie U.", "clean_date": "4/20/2024", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "aaron_a", "name": "Aaron A.", "clean_date": "12/28/2011", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "gavin_l", "name": "Gavin L.", "clean_date": "2/25/2022", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "mark_e", "name": "Mark E.", "clean_date": "6/7/2023", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "ac_a", "name": "AC A.", "clean_date": "8/1/2023", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "daniel_l", "name": "Daniel L.", "clean_date": "8/5/2024", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "christopher_j", "name": "Christopher J.", "clean_date": "8/3/2025", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "luke_s", "name": "Luke S.", "clean_date": "12/10/2018", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "dean_t", "name": "Dean T.", "clean_date": "4/13/2022", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "trini_m", "name": "Trini M.", "clean_date": "8/19/2024", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "jay_p", "name": "Jay P.", "clean_date": "3/28/2025", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "christian_t", "name": "Christian T.", "clean_date": "3/1/2026", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "eric_z", "name": "Eric Z.", "clean_date": "6/9/2026", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "joseph_p", "name": "Joseph P.", "clean_date": "1/1/2022", "sponsor_name": "Jimmy M.", "sponsor_id": "jimmy_m"}, {"id": "tiago_r", "name": "Tiago R.", "clean_date": "4/2/2025", "sponsor_name": "Jimmy W.", "sponsor_id": "jimmy_w"}], "children": {"richard_m": ["juan_y"], "juan_y": ["eddie_l"], "eddie_l": ["anthony_q", "chris_j", "ernest_c", "jimmy_m", "jimmy_w", "marquis_r", "michael_g", "mike_m", "pete_a", "ronnie_r", "steve_l", "steven_r", "travis_v"], "chris_j": [], "steven_r": [], "ernest_c": [], "mike_m": ["aaron_a", "beco_p", "brad_m", "dean_t", "edgar_f", "luke_s", "paul_s", "rick_s"], "travis_v": [], "ronnie_r": [], "anthony_q": ["christian_t", "eric_z", "jay_p", "trini_m"], "marquis_r": [], "michael_g": [], "jimmy_m": ["joseph_p"], "pete_a": [], "jimmy_w": ["tiago_r"], "steve_l": [], "rick_s": [], "paul_s": [], "brad_m": ["patrick_s"], "patrick_s": [], "edgar_f": ["elliot_w", "max_w", "sean_o"], "elliot_w": [], "max_w": ["chris_r"], "chris_r": [], "sean_o": [], "beco_p": ["carlos_a", "collin_w", "forrest_m", "hector_a", "louie_u", "ramon_g"], "forrest_m": ["chris_n", "marquez_c"], "chris_n": [], "marquez_c": [], "hector_a": ["david_d", "mark_e__jr"], "david_d": [], "mark_e__jr": [], "collin_w": ["alex_b", "alex_l"], "alex_b": [], "alex_l": [], "ramon_g": ["jason_h", "ronnie_p"], "ronnie_p": [], "jason_h": [], "carlos_a": [], "louie_u": [], "aaron_a": ["ac_a", "christopher_j", "daniel_l", "gavin_l", "mark_e"], "gavin_l": [], "mark_e": [], "ac_a": [], "daniel_l": [], "christopher_j": [], "luke_s": [], "dean_t": [], "trini_m": [], "jay_p": [], "christian_t": [], "eric_z": [], "joseph_p": [], "tiago_r": []}, "root": "richard_m"};
const byId=Object.fromEntries(DATA.people.map(p=>[p.id,p]));
const parentById=Object.fromEntries(DATA.people.filter(p=>p.sponsor_id).map(p=>[p.id,p.sponsor_id]));
function enterSite(){document.getElementById('splash').classList.add('hide')}
const BRANCH_COLORS=['#d62828','#f77f00','#fcbf49','#2a9d8f','#0077b6','#4361ee','#7209b7','#b5179e','#588157','#6c757d','#e76f51','#00a896'];
function colorForSponsor(id){let h=0;for(let i=0;i<id.length;i++){h=((h<<5)-h)+id.charCodeAt(i);h|=0}return BRANCH_COLORS[Math.abs(h)%BRANCH_COLORS.length]}
function personCard(id,hit=false,branchColor='#5b6f82'){const p=byId[id];return `<div class="person${hit?' hit':''}" style="--card-branch-color:${branchColor}"><div class="name">${p.name}</div><div class="date">Clean: ${p.clean_date}</div></div>`}
function subtree(id,incomingColor='#5b6f82'){const kids=DATA.children[id]||[];const sponsorColor=colorForSponsor(id);return `<li>${personCard(id,false,incomingColor)}${kids.length?`<ul style="--branch-color:${sponsorColor}">${kids.map(childId=>subtree(childId,sponsorColor)).join('')}</ul>`:''}</li>`}
function fullTree(){return `<ul class="outline">${subtree(DATA.root)}</ul>`}
function pathTo(id){const a=[];let c=id;while(c){a.unshift(c);c=parentById[c]}return a}
function branchTree(id){const path=pathTo(id);let h='<ul class="outline">';for(let i=0;i<path.length;i++){const currentId=path[i];const parentId=i>0?path[i-1]:null;const incomingColor=parentId?colorForSponsor(parentId):'#5b6f82';h+=`<li>${personCard(currentId,false,incomingColor)}`;if(i<path.length-1){h+=`<ul style="--branch-color:${colorForSponsor(currentId)}">`}else{const kids=DATA.children[id]||[];if(kids.length)h+=`<ul style="--branch-color:${colorForSponsor(id)}">${kids.map(childId=>subtree(childId,colorForSponsor(id))).join('')}</ul>`}}for(let i=0;i<path.length;i++){if(i<path.length-1)h+='</ul>';h+='</li>'}return h+'</ul>'}
function show(html){document.getElementById('workspace').innerHTML=html;window.scrollTo({top:0,behavior:'smooth'})}
function collapseTree(){document.getElementById('workspace').innerHTML='<div class="blank"></div>';document.getElementById('branchSelect').value='';document.getElementById('searchBox').value=''}
function expandTree(){show(fullTree());document.getElementById('branchSelect').value=''}
function showBranch(){const id=document.getElementById('branchSelect').value;if(!id){collapseTree();return}show(branchTree(id));document.getElementById('searchBox').value=''}
function searchTree(){const q=document.getElementById('searchBox').value.trim().toLowerCase();if(!q){collapseTree();return}const p=DATA.people.find(x=>x.name.toLowerCase().includes(q));if(!p){show('<p>No member found.</p>');return}show(branchTree(p.id).replace(`class="person"`,`class="person hit"`));document.getElementById('branchSelect').value=''}
function populate(){DATA.people.filter(p=>(DATA.children[p.id]||[]).length).sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;document.getElementById('branchSelect').appendChild(o)})}
function openForm(mode){if(!FORM_WEB_APP_URL||FORM_WEB_APP_URL.includes('PASTE_')){alert('Form URL is not configured.');return}document.getElementById('formFrame').src=FORM_WEB_APP_URL+'?mode='+encodeURIComponent(mode)+'&t='+Date.now();document.getElementById('modal').classList.add('open')}
function closeForm(){document.getElementById('modal').classList.remove('open');document.getElementById('formFrame').src='about:blank'}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeForm()});window.addEventListener('message',e=>{if(e.data&&e.data.type==='family-tree-form-close')closeForm()});populate();collapseTree();
</script></body></html>
