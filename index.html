<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recovery Sponsor Family Tree</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f4f4f2;color:#222}
h1{margin:0 0 6px}
.sub{color:#666;margin-bottom:15px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
button,input{padding:8px 10px;border:1px solid #bbb;border-radius:8px;background:#fff}
button{cursor:pointer}
.notice{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:15px;max-width:900px}
.tree{overflow:auto;padding:20px 10px 60px}
ul{padding-top:20px;position:relative;display:flex;justify-content:center;margin:0;padding-left:0}
li{list-style:none;text-align:center;position:relative;padding:20px 8px 0}
li:before,li:after{content:'';position:absolute;top:0;right:50%;border-top:2px solid #aaa;width:50%;height:20px}
li:after{right:auto;left:50%;border-left:2px solid #aaa}
li:only-child:before,li:only-child:after{display:none}
li:only-child{padding-top:0}
li:first-child:before,li:last-child:after{border:0}
li:last-child:before{border-right:2px solid #aaa;border-radius:0 5px 0 0}
li:first-child:after{border-radius:5px 0 0 0}
ul ul:before{content:'';position:absolute;top:0;left:50%;border-left:2px solid #aaa;height:20px}
.card{min-width:145px;max-width:180px;background:#fff;border:2px solid #5b6f82;border-radius:12px;padding:10px;display:inline-block;box-shadow:0 2px 7px rgba(0,0,0,.08);cursor:pointer}
.name{font-weight:700}
.date{font-size:13px;color:#555;margin-top:3px}
.badge{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:999px;background:#5b6f82;color:white;font-size:11px}
.hidden>ul{display:none}
.hit{outline:4px solid rgba(0,0,0,.15)}
@media print{.toolbar,.notice{display:none}body{background:white}.tree{overflow:visible}}

.primary{background:#2f5d50!important;color:#fff!important;border-color:#2f5d50!important;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;padding:20px;overflow:auto}
.modal.open{display:block}
.dialog{max-width:680px;margin:30px auto;background:#fff;border-radius:14px;padding:22px;box-shadow:0 15px 40px rgba(0,0,0,.28)}
.dialog-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
.close{border:0;background:transparent;font-size:28px;line-height:1}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.field.full{grid-column:1/-1}
.field input,.field select,.field textarea{padding:10px;border:1px solid #bbb;border-radius:8px;width:100%;font:inherit}
.field textarea{min-height:90px;resize:vertical}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.status{margin-top:12px;padding:10px;border-radius:8px;display:none}
.status.ok{display:block;background:#e7f4ea;color:#215a2d}
.status.err{display:block;background:#fde8e8;color:#8a1c1c}
.small{font-size:12px;color:#666}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}

</style>
</head>
<body>
<h1>Recovery Sponsor Family Tree</h1>
<div class="sub">Public review version — names, clean dates, and sponsor relationships only</div>

<div class="toolbar">
<button onclick="expandAll()">Expand all</button>
<button onclick="collapseAll()">Collapse all</button>
<button onclick="window.print()">Print / Save PDF</button>
<input id="q" placeholder="Search name" oninput="searchName()">
<button class="primary" onclick="openUpdateForm()">Submit an Update</button>
</div>

<div class="notice">
This public version does not include phone numbers or email addresses.
</div>

<div id="tree" class="tree"></div>


<div id="updateModal" class="modal" aria-hidden="true">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="formTitle">
    <div class="dialog-head">
      <div><h2 id="formTitle" style="margin:0">Submit a Tree Update</h2><div class="small">Changes are reviewed before being added to the master database.</div></div>
      <button class="close" onclick="closeUpdateForm()" aria-label="Close">&times;</button>
    </div>
    <form id="updateForm">
      <div class="form-grid">
        <label class="field"><span>Request type *</span><select name="requestType" required><option value="">Choose one</option><option>Add a new sponsee</option><option>Correct a clean date</option><option>Change sponsor</option><option>Update phone number</option><option>Update email address</option><option>Remove information</option><option>Report an error</option></select></label>
        <label class="field"><span>Person being added or updated *</span><input name="personName" required placeholder="First name and last initial"></label>
        <label class="field"><span>Sponsor</span><input name="sponsorName" placeholder="Sponsor name"></label>
        <label class="field"><span>Clean date</span><input type="date" name="cleanDate"></label>
        <label class="field"><span>Phone number</span><input name="phone" placeholder="Optional"></label>
        <label class="field"><span>Email address</span><input type="email" name="email" placeholder="Optional"></label>
        <label class="field"><span>Your name *</span><input name="submittedBy" required></label>
        <label class="field"><span>Your email</span><input type="email" name="submitterEmail" placeholder="Optional"></label>
        <label class="field full"><span>Notes</span><textarea name="notes"></textarea></label>
      </div>
      <div class="actions"><button type="button" onclick="closeUpdateForm()">Cancel</button><button type="submit" class="primary">Submit for Review</button></div>
      <div id="formStatus" class="status"></div>
    </form>
  </div>
</div>

<script>

const UPDATE_ENDPOINT = "https://script.google.com/macros/s/AKfycbyL17FQDdGGO1sbXpGk2-uHDLZN_RcNOSTqBw_fZX0IzJPr70JTbExsqrIyC3S5iVYTTQ/exec";
function openUpdateForm(){document.getElementById('updateModal').classList.add('open');document.getElementById('updateModal').setAttribute('aria-hidden','false')}
function closeUpdateForm(){document.getElementById('updateModal').classList.remove('open');document.getElementById('updateModal').setAttribute('aria-hidden','true')}
document.getElementById('updateModal').addEventListener('click',e=>{if(e.target.id==='updateModal')closeUpdateForm()});
document.getElementById('updateForm').addEventListener('submit',async e=>{
 e.preventDefault(); const status=document.getElementById('formStatus'); status.className='status';
 if(UPDATE_ENDPOINT.includes('PASTE_GOOGLE')){status.className='status err';status.textContent='Form setup is not complete yet. Add the Google Apps Script Web App URL to this HTML file.';return;}
 const payload=Object.fromEntries(new FormData(e.target).entries()); payload.submittedAt=new Date().toISOString();
 try{await fetch(UPDATE_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});status.className='status ok';status.textContent='Thank you. Your update was submitted for review.';e.target.reset();}
 catch(err){status.className='status err';status.textContent='The update could not be submitted. Please try again later.';}
});

const DATA={"people": [{"id": "richard_m", "name": "Richard M.", "clean_date": "12/24/1964", "sponsor_name": null, "sponsor_id": null}, {"id": "juan_y", "name": "Juan Y.", "clean_date": "3/5/1979", "sponsor_name": "Richard M.", "sponsor_id": "richard_m"}, {"id": "eddie_l", "name": "Eddie L.", "clean_date": "2/1/1989", "sponsor_name": "Juan Y.", "sponsor_id": "juan_y"}, {"id": "chris_j", "name": "Chris J.", "clean_date": "12/27/2001", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "steven_r", "name": "Steven R.", "clean_date": "4/21/2000", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "ernest_c", "name": "Ernest C.", "clean_date": "1/10/2012", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "mike_m", "name": "Mike M.", "clean_date": "6/9/1996", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "travis_v", "name": "Travis V.", "clean_date": "9/11/2017", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "ronnie_r", "name": "Ronnie R.", "clean_date": "9/11/2017", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "anthony_q", "name": "Anthony Q.", "clean_date": "10/24/2017", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "marquis_r", "name": "Marquis R.", "clean_date": "8/1/2012", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "michael_g", "name": "Michael G.", "clean_date": "11/13/2025", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "jimmy_m", "name": "Jimmy M.", "clean_date": "3/27/1991", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "pete_a", "name": "Pete A.", "clean_date": "2/8/2003", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "jimmy_w", "name": "Jimmy W.", "clean_date": "11/6/2020", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "steve_l", "name": "Steve L.", "clean_date": "8/12/2001", "sponsor_name": "Eddie L.", "sponsor_id": "eddie_l"}, {"id": "rick_s", "name": "Rick S.", "clean_date": "1/23/1993", "s : "11/7/2022", "sponsor_name": "Collin W.", "sponsor_id": "collin_w"}, {"id": "alex_l", "name": "Alex L.", "clean_date": "9/24/2024", "sponsor_name": "Collin W.", "sponsor_id": "collin_w"}, {"id": "ramon_g", "name": "Ramon G.", "clean_date": "12/26/2020", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "ronnie_p", "name": "Ronnie P.", "clean_date": "10/20/2024", "sponsor_name": "Ramon G.", "sponsor_id": "ramon_g"}, {"id": "jason_h", "name": "Jason H.", "clean_date": "3/1/2026", "sponsor_name": "Ramon G.", "sponsor_id": "ramon_g"}, {"id": "carlos_a", "name": "Carlos A.", "clean_date": "10/1/2023", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "louie_u", "name": "Louie U.", "clean_date": "4/20/2024", "sponsor_name": "Beco P.", "sponsor_id": "beco_p"}, {"id": "aaron_a", "name": "Aaron A.", "clean_date": "12/28/2011", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "gavin_l", "name": "Gavin L.", "clean_date": "2/25/2022", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "mark_e", "name": "Mark E.", "clean_date": "6/7/2023", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "ac_a", "name": "AC A.", "clean_date": "8/1/2023", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "daniel_l", "name": "Daniel L.", "clean_date": "8/5/2024", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "christopher_j", "name": "Christopher J.", "clean_date": "8/3/2025", "sponsor_name": "Aaron A.", "sponsor_id": "aaron_a"}, {"id": "luke_s", "name": "Luke S.", "clean_date": "12/10/2018", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "dean_t", "name": "Dean T.", "clean_date": "4/13/2022", "sponsor_name": "Mike M.", "sponsor_id": "mike_m"}, {"id": "trini_m", "name": "Trini M.", "clean_date": "8/19/2024", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "jay_p", "name": "Jay P.", "clean_date": "3/28/2025", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "christian_t", "name": "Christian T.", "clean_date": "3/1/2026", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "eric_z", "name": "Eric Z.", "clean_date": "6/9/2026", "sponsor_name": "Anthony Q.", "sponsor_id": "anthony_q"}, {"id": "joseph_p", "name": "Joseph P.", "clean_date": "1/1/2022", "sponsor_name": "Jimmy M.", "sponsor_id": "jimmy_m"}, {"id": "tiago_r", "name": "Tiago R.", "clean_date": "4/2/2025", "sponsor_name": "Jimmy W.", "sponsor_id": "jimmy_w"}], "children": {"richard_m": ["juan_y"], "juan_y": ["eddie_l"], "eddie_l": ["anthony_q", "chris_j", "ernest_c", "jimmy_m", "jimmy_w", "marquis_r", "michael_g", "mike_m", "pete_a", "ronnie_r", "steve_l", "steven_r", "travis_v"], "chris_j": [], "steven_r": [], "ernest_c": [], "mike_m": ["aaron_a", "beco_p", "brad_m", "dean_t", "edgar_f", "luke_s", "paul_s", "rick_s"], "travis_v": [], "ronnie_r": [], "anthony_q": ["christian_t", "eric_z", "jay_p", "trini_m"], "marquis_r": [], "michael_g": [], "jimmy_m": ["joseph_p"], "pete_a": [], "jimmy_w": ["tiago_r"], "steve_l": [], "rick_s": [], "paul_s": [], "brad_m": ["patrick_s"], "patrick_s": [], "edgar_f": ["elliot_w", "max_w", "sean_o"], "elliot_w": [], "max_w": ["chris_r"], "chris_r": [], "sean_o": [], "beco_p": ["carlos_a", "collin_w", "forrest_m", "hector_a", "louie_u", "ramon_g"], "forrest_m": ["chris_n", "marquez_c"], "chris_n": [], "marquez_c": [], "hector_a": ["david_d", "mark_e__jr"], "david_d": [], "mark_e__jr": [], "collin_w": ["alex_b", "alex_l"], "alex_b": [], "alex_l": [], "ramon_g": ["jason_h", "ronnie_p"], "ronnie_p": [], "jason_h": [], "carlos_a": [], "louie_u": [], "aaron_a": ["ac_a", "christopher_j", "daniel_l", "gavin_l", "mark_e"], "gavin_l": [], "mark_e": [], "ac_a": [], "daniel_l": [], "christopher_j": [], "luke_s": [], "dean_t": [], "trini_m": [], "jay_p": [], "christian_t": [], "eric_z": [], "joseph_p": [], "tiago_r": []}, "root": "richard_m"};
const byId=Object.fromEntries(DATA.people.map(p=>[p.id,p]));

function card(p){
 const n=(DATA.children[p.id]||[]).length;
 return `<div class="card" data-name="${p.name.toLowerCase()}" onclick="toggle(event,'${p.id}')">
 <div class="name">${p.name}</div>
 <div class="date">Clean: ${p.clean_date}</div>
 ${n?`<div class="badge">${n} sponsee${n===1?'':'s'}</div>`:''}
 </div>`;
}

function node(id){
 let s=`<li id="n-${id}">${card(byId[id])}`;
 const kids=DATA.children[id]||[];
 if(kids.length) s+='<ul>'+kids.map(node).join('')+'</ul>';
 return s+'</li>';
}

document.getElementById('tree').innerHTML='<ul>'+node(DATA.root)+'</ul>';

function toggle(e,id){
 e.stopPropagation();
 document.getElementById('n-'+id).classList.toggle('hidden');
}

function expandAll(){
 document.querySelectorAll('.hidden').forEach(x=>x.classList.remove('hidden'));
}

function collapseAll(){
 document.querySelectorAll('#tree li').forEach(x=>{
   if(x.querySelector(':scope > ul'))x.classList.add('hidden');
 });
 document.getElementById('n-'+DATA.root).classList.remove('hidden');
}

function searchName(){
 const q=document.getElementById('q').value.trim().toLowerCase();
 document.querySelectorAll('.card').forEach(c=>{
   c.classList.remove('hit');
   if(q && c.dataset.name.includes(q)){
     c.classList.add('hit');
     let li=c.closest('li');
     while(li){
       li.classList.remove('hidden');
       li=li.parentElement?.closest('li');
     }
     c.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
   }
 });
}
</script>
</body>
</html>
