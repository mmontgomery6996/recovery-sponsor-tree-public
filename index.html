<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recovery Sponsor Family Tree</title>
<style>
:root{--brand:#2f5d50}
body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f4f4f2;color:#222}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
button,input{font:inherit;padding:9px 11px;border:1px solid #bbb;border-radius:8px;background:#fff}
button{cursor:pointer}.primary{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;padding:20px}
.modal.open{display:block}
.dialog{position:relative;max-width:760px;height:88vh;margin:2vh auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 15px 40px rgba(0,0,0,.28)}
.close{position:absolute;right:10px;top:6px;z-index:2;border:0;background:#fff;font-size:28px;line-height:1}
iframe{width:100%;height:100%;border:0}
</style>
</head>
<body>
<h1>Recovery Sponsor Family Tree</h1>
<p>Public review version. Phone numbers and email addresses are not stored in this page.</p>

<div class="toolbar">
  <button class="primary" onclick="openUpdateForm()">Submit or Review an Update</button>
</div>

<!-- Keep your existing family tree HTML below this point. -->

<div id="updateModal" class="modal" aria-hidden="true">
  <div class="dialog">
    <button class="close" onclick="closeUpdateForm()" aria-label="Close">&times;</button>
    <iframe id="updateFrame" title="Sponsor tree update form"></iframe>
  </div>
</div>

<script>
const FORM_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymQT3RB_HJWm1By9SJqgEbydhPuE72wf_mBtabWFTDUCxKnOxQOYaBBr1FduIYZj28eg/exec";

function openUpdateForm(){
  if (FORM_WEB_APP_URL.includes("PASTE_GOOGLE")) {
    alert("The form web app URL has not been configured yet.");
    return;
  }
  const frame = document.getElementById("updateFrame");
  // Reloads the form every time so all old values are cleared.
  frame.src = FORM_WEB_APP_URL + "?t=" + Date.now();
  document.getElementById("updateModal").classList.add("open");
  document.getElementById("updateModal").setAttribute("aria-hidden","false");
}

function closeUpdateForm(){
  const modal = document.getElementById("updateModal");
  const frame = document.getElementById("updateFrame");
  modal.classList.remove("open");
  modal.setAttribute("aria-hidden","true");
  // Removing the iframe source clears all form data.
  frame.src = "about:blank";
}

document.getElementById("updateModal").addEventListener("click", function(e){
  if (e.target.id === "updateModal") closeUpdateForm();
});

window.addEventListener("message", function(e){
  if (e.data && e.data.type === "sponsor-form-close") {
    closeUpdateForm();
  }
});
</script>
</body>
</html>
